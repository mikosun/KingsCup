<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="飲み会ゲーム「キングスカップ」をWebブラウザで楽しめます">
    <title>キングスカップ - 飲み会ゲーム</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="header-main">
                <h1 class="logo">👑 キングスカップ</h1>
                <p class="tagline">トランプを引いてルールに従おう！</p>
            </div>
            <a href="https://github.com/mikosun/KingsCup" target="_blank" rel="noopener noreferrer" class="github-link" title="GitHub リポジトリを開く">
                <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v 3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="main-container">
            <div class="game-section">
                <div class="card-display">
                    <div class="card empty-card" id="cardDisplay">
                        ?
                    </div>
                    <div class="card-info" id="cardInfo"></div>
                    <div class="stats" id="stats"></div>
                    <div class="button-group">
                        <button class="generate-btn" id="drawBtn">🎲 カードを引く</button>
                        <button class="retry-btn" id="resetBtn">🔄 リセット</button>
                    </div>
                </div>

                <div class="rules-section">
                    <h2>📋 ルール一覧</h2>
                    <div class="rules-list">
                    <div class="rule" data-rank="A">
                        <div class="rule-number">A (1)</div>
                        <div class="rule-text">引いた人以外がグイ</div>
                    </div>
                    <div class="rule" data-rank="2">
                        <div class="rule-number">2</div>
                        <div class="rule-text">指名された人がグイ</div>
                    </div>
                    <div class="rule" data-rank="3">
                        <div class="rule-number">3</div>
                        <div class="rule-text">引いた人がグイ</div>
                    </div>
                    <div class="rule" data-rank="4">
                        <div class="rule-number">4</div>
                        <div class="rule-text">女子がグイ</div>
                    </div>
                    <div class="rule" data-rank="5">
                        <div class="rule-number">5</div>
                        <div class="rule-text">引いた人の左右がグイ</div>
                    </div>
                    <div class="rule" data-rank="6">
                        <div class="rule-number">6</div>
                        <div class="rule-text">男子がグイ</div>
                    </div>
                    <div class="rule" data-rank="7">
                        <div class="rule-number">7</div>
                        <div class="rule-text">出たら片手を上げて遅い人がグイ</div>
                    </div>
                    <div class="rule" data-rank="8">
                        <div class="rule-number">8</div>
                        <div class="rule-text">連帯責任の相棒を決める（次出たら前のは解消）</div>
                    </div>
                    <div class="rule" data-rank="9">
                        <div class="rule-number">9</div>
                        <div class="rule-text">好きなゲーム</div>
                    </div>
                    <div class="rule" data-rank="10">
                        <div class="rule-number">10</div>
                        <div class="rule-text">次のターン3枚引く</div>
                    </div>
                    <div class="rule" data-rank="J">
                        <div class="rule-number">J (11)</div>
                        <div class="rule-text">好きなルール作る</div>
                    </div>
                    <div class="rule" data-rank="Q">
                        <div class="rule-number">Q (12)</div>
                        <div class="rule-text">クエスチョンマスター（次出たら前のは解消）</div>
                    </div>
                    <div class="rule" data-rank="K">
                        <div class="rule-number">K (13)</div>
                        <div class="rule-text">4枚目を引いた人がショットをグイ</div>
                    </div>
                    <div class="rule" data-rank="JOKER">
                        <div class="rule-number">JOKER</div>
                        <div class="rule-text">2枚目引いたらショット2杯</div>
                    </div>
                </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 キングスカップ. 楽しい飲み会を！</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
